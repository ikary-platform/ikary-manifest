name: ikary-local

services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4502:4502"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4502/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  cell-runtime-api:
    build:
      context: .
      dockerfile: apps/cell-runtime-api/Dockerfile
    ports:
      - "4501:4501"
    volumes:
      - "${IKARY_MANIFEST_DIR:-.}:/manifest:ro"
      - ikary-data:/data
    environment:
      IKARY_MANIFEST_PATH: /manifest/${IKARY_MANIFEST_FILE:-manifest.yaml}
      DATABASE_URL: sqlite:////data/local.db
      PORT: "4501"
      AUTH_ACCESS_TOKEN_SECRET: ${AUTH_ACCESS_TOKEN_SECRET:-ikary-preview-access-secret-key-0}
      AUTH_REFRESH_TOKEN_SECRET: ${AUTH_REFRESH_TOKEN_SECRET:-ikary-preview-refresh-secret-key0}
      AUTH_TOKEN_HASH_SECRET: ${AUTH_TOKEN_HASH_SECRET:-ikary-preview-hash-secret-key-000}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-localhost}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4501/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  preview-server:
    build:
      context: .
      dockerfile: apps/preview-server/Dockerfile
    ports:
      - "4500:4500"
    volumes:
      - "${IKARY_MANIFEST_DIR:-.}:/manifest:ro"
    environment:
      IKARY_MANIFEST_PATH: /manifest/${IKARY_MANIFEST_FILE:-manifest.yaml}
      DATA_API_URL: http://cell-runtime-api:4501
      VITE_DATA_API_URL: http://localhost:4501
      PORT: "4500"
    depends_on:
      cell-runtime-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4500/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  ikary-data:
    name: ikary-local-data
