name: ikary-local

services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3100/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  cell-runtime-api:
    build:
      context: .
      dockerfile: apps/cell-runtime-api/Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - "${IKARY_MANIFEST_DIR:-.}:/manifest:ro"
      - ikary-data:/data
    environment:
      IKARY_MANIFEST_PATH: /manifest/${IKARY_MANIFEST_FILE:-manifest.yaml}
      DATABASE_URL: sqlite:////data/local.db
      PORT: "4000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  preview-server:
    build:
      context: .
      dockerfile: apps/preview-server/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - "${IKARY_MANIFEST_DIR:-.}:/manifest:ro"
    environment:
      IKARY_MANIFEST_PATH: /manifest/${IKARY_MANIFEST_FILE:-manifest.yaml}
      DATA_API_URL: http://cell-runtime-api:4000
      VITE_DATA_API_URL: http://localhost:4000
      PORT: "3000"
    depends_on:
      cell-runtime-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  ikary-data:
    name: ikary-local-data
