$schema: 'http://json-schema.org/draft-07/schema#'
title: PieChartPresentation
description: Presentation contract for the pie-chart primitive (supports donut via innerRadius > 0).
type: object
required: [type, data]
additionalProperties: false
properties:
  type:
    type: string
    const: pie-chart
  data:
    type: array
    minItems: 1
    items:
      type: object
      required: [label, value]
      additionalProperties: false
      properties:
        label:
          type: string
          minLength: 1
        value:
          type: number
        color:
          type: string
  title:
    type: string
    minLength: 1
  description:
    type: string
    minLength: 1
  height:
    type: integer
    minimum: 100
    maximum: 800
  showLegend:
    type: boolean
  legendPosition:
    $ref: '#/definitions/ChartLegendPosition'
  showTooltip:
    type: boolean
  innerRadius:
    type: integer
    minimum: 0
  showLabels:
    type: boolean

definitions:
  ChartLegendPosition:
    type: string
    enum: [top, right, bottom, left, none]
