$schema: 'http://json-schema.org/draft-07/schema#'
title: RadialChartPresentation
description: Presentation contract for the radial-chart primitive (progress arcs).
type: object
required: [type, data]
additionalProperties: false
properties:
  type:
    type: string
    const: radial-chart
  data:
    type: array
    minItems: 1
    items:
      type: object
      required: [label, value]
      additionalProperties: false
      properties:
        label:
          type: string
          minLength: 1
        value:
          type: number
          minimum: 0
          maximum: 100
        color:
          type: string
  title:
    type: string
    minLength: 1
  description:
    type: string
    minLength: 1
  height:
    type: integer
    minimum: 100
    maximum: 800
  showLegend:
    type: boolean
  showTooltip:
    type: boolean
  innerRadius:
    type: integer
    minimum: 0
  outerRadius:
    type: integer
    minimum: 0
