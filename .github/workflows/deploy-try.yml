name: Deploy try.ikary.co

on:
  push:
    branches: [main]
    paths:
      - 'apps/try-demo/**'
      - 'apps/try-api/**'
      - 'libs/cell-ai/**'
      - 'libs/cell-contract/**'
      - 'libs/cell-engine/**'
      - 'libs/cell-data/**'
      - 'libs/cell-presentation/**'
      - 'libs/cell-primitive-contract/**'
      - 'libs/cell-primitives/**'
      - 'libs/cell-renderer/**'
      - 'libs/system-ai/**'
      - 'libs/system-localization/**'
      - 'manifests/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-try.yml'
  workflow_dispatch:

concurrency:
  group: deploy-try-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  API_SERVICE_NAME: try-api
  API_IMAGE: ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/ikary/try-api

permissions:
  contents: read
  id-token: write

jobs:
  deploy-demo:
    name: Deploy SPA to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build SPA
        run: pnpm --filter @ikary/try-demo build
        env:
          VITE_IKARY_PRODUCT_URL: ${{ vars.VITE_IKARY_PRODUCT_URL }}
          VITE_IKARY_DOCS_URL: ${{ vars.VITE_IKARY_DOCS_URL }}
          VITE_IKARY_GITHUB_URL: ${{ vars.VITE_IKARY_GITHUB_URL }}
          VITE_IKARY_MCP_URL: ${{ vars.VITE_IKARY_MCP_URL }}

      - name: Deploy to Cloudflare Pages
        # `cloudflare/wrangler-action` calls `pnpm add wrangler` inside a
        # pnpm workspace root, which triggers ERR_PNPM_ADDING_TO_ROOT.
        # Call wrangler via npx directly to sidestep the workspace lock.
        # Run from apps/try-demo so wrangler auto-detects the sibling
        # `functions/` directory (same-origin proxy to the Cloud Run API).
        working-directory: apps/try-demo
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages deploy dist \
            --project-name="${{ vars.CLOUDFLARE_PAGES_PROJECT || 'try-ikary-co' }}" \
            --branch=main \
            --commit-dirty=true

  deploy-api:
    name: Deploy API to Cloud Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ env.API_IMAGE }}:${{ github.sha }} \
            -t ${{ env.API_IMAGE }}:latest \
            -f apps/try-api/Dockerfile .
          docker push ${{ env.API_IMAGE }}:${{ github.sha }}
          docker push ${{ env.API_IMAGE }}:latest

      - name: Write env vars file
        # `gcloud ... --set-env-vars KEY=VAL` uses commas as a separator
        # between multiple vars, so the model chain (which contains
        # commas) gets mis-parsed. `--env-vars-file` takes a YAML file
        # with no such ambiguity.
        env:
          AI_MODEL_MANIFEST_GENERATE: ${{ vars.AI_MODEL_MANIFEST_GENERATE || 'openai/gpt-oss-120b:free,qwen/qwen3-next-80b-a3b-instruct:free,google/gemma-4-31b-it:free,anthropic/claude-sonnet-4-5' }}
          AI_BUDGET_PER_TURN_OUTPUT_TOKENS: ${{ vars.AI_BUDGET_PER_TURN_OUTPUT_TOKENS || '2000' }}
          FEATURE_AI_ENABLED: ${{ vars.FEATURE_AI_ENABLED || 'true' }}
        run: |
          python3 - <<'PY'
          import os, yaml
          out = {
              "NODE_ENV": "production",
              "AI_MODEL_MANIFEST_GENERATE": os.environ["AI_MODEL_MANIFEST_GENERATE"],
              "AI_BUDGET_PER_TURN_OUTPUT_TOKENS": os.environ["AI_BUDGET_PER_TURN_OUTPUT_TOKENS"],
              "FEATURE_AI_ENABLED": os.environ["FEATURE_AI_ENABLED"],
          }
          with open("/tmp/try-api-env.yaml", "w") as f:
              yaml.safe_dump(out, f, default_flow_style=False)
          print(open("/tmp/try-api-env.yaml").read())
          PY

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.API_SERVICE_NAME }} \
            --image ${{ env.API_IMAGE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 120s \
            --env-vars-file /tmp/try-api-env.yaml \
            --set-secrets AI_OPENROUTER_API_KEYS=openrouter-key:latest \
            --quiet

      - name: Show service URL
        run: |
          URL=$(gcloud run services describe ${{ env.API_SERVICE_NAME }} --region ${{ env.GCP_REGION }} --format 'value(status.url)')
          echo "Deployed to: $URL"
          echo "Health:      $URL/health"
          echo "Demo status: $URL/demo/status"
