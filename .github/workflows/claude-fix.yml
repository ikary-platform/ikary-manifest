name: Claude Implement Fix

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: claude-do-fix-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  implement-fix:
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@claude do fix') &&
      !github.event.issue.pull_request &&
      contains(vars.CLAUDE_ALLOWED_USERS, github.event.comment.user.login)

    steps:
      - name: Acknowledge trigger
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          branch_prefix: "claude/"
          show_full_output: true
          claude_args: >
            --model claude-sonnet-4-6
            --max-turns 30
          prompt: |
            Fix the bug described in this issue. Follow all rules in CLAUDE.md.

            1. Find the fix plan in the comments (## Fix Plan heading). Follow it step by step.
            2. If no plan exists, investigate the root cause and implement the fix directly.
            3. Add or update tests to prevent regression.
            4. Run pnpm run build and pnpm run typecheck before creating the PR.

            PR FORMAT:
            - Title: fix(<scope>): <description>
            - Body: no emojis, no em-dashes, active voice, include root cause summary
            - Include "Closes #<issue-number>"
