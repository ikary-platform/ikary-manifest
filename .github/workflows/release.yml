name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm run release
          version: pnpm run version
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release note and release branch
        if: steps.changesets.outputs.published == 'true'
        run: |
          CLI_VERSION=$(echo '${{ steps.changesets.outputs.publishedPackages }}' \
            | jq -r '.[] | select(.name == "@ikary/cli") | .version' 2>/dev/null || true)

          if [ -z "$CLI_VERSION" ]; then
            echo "ℹ️ @ikary/cli was not in this publish — skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

          # Extract the CHANGELOG section for this version and write releases/vX.Y.Z.md
          CHANGELOG_BODY=$(awk \
            "/^## ${CLI_VERSION}$/{found=1; next} /^## /{if(found) exit} found{print}" \
            apps/cli/CHANGELOG.md | sed '/^[[:space:]]*$/d')

          RELEASE_FILE="releases/v${CLI_VERSION}.md"

          {
            echo "---"
            echo "version: ${CLI_VERSION}"
            echo "date: $(date -u +%Y-%m-%d)"
            echo "---"
            echo ""
            echo "# v${CLI_VERSION}"
            echo ""
            echo "${CHANGELOG_BODY}"
          } > "${RELEASE_FILE}"

          git add "${RELEASE_FILE}"
          git commit -m "chore: add release note for v${CLI_VERSION}"
          git pull --rebase origin main
          git push origin main
          echo "✅ Created ${RELEASE_FILE}"

          # Create a permanent release branch
          BRANCH="release/v${CLI_VERSION}"
          git checkout -b "${BRANCH}"
          git push origin "${BRANCH}"
          echo "✅ Created release branch: ${BRANCH}"
