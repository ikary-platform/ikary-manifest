name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  coverage-contracts:
    name: Coverage — Node contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm coverage:contracts

  coverage-ui:
    name: Coverage — UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm coverage:ui

  coverage-python:
    name: Coverage — Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -e "contracts/python[dev]"

      - run: python3 -m pytest --cov=ikary_manifest --cov-report=term-missing --cov-fail-under=100 tests/
        working-directory: contracts/python
