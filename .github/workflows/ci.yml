name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  coverage-contracts:
    name: Coverage — Node contracts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm coverage:contracts

  coverage-ui:
    name: Coverage — UI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm coverage:ui

  coverage-system-db-core:
    name: Coverage — system-db-core
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm coverage:system-db-core

  coverage-cell-migration-core:
    name: Coverage — cell-migration-core
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm coverage:cell-migration-core

  coverage-cell-runtime-core:
    name: Coverage — cell-runtime-core
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm coverage:cell-runtime-core

  e2e:
    name: E2E — MCP Server & API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Start MCP server
        run: pnpm --filter @ikary/mcp-server start &

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3100/api/schemas/manifest --timeout 30000

      - name: Run E2E tests
        run: pnpm --filter @ikary/mcp-server-e2e test
        env:
          IKARY_API_URL: http://localhost:3100

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: apps/mcp-server-e2e/test-results/junit.xml
          retention-days: 30

      - name: Run local stack E2E tests
        run: pnpm --filter @ikary/local-stack-e2e test

      - name: Upload local stack E2E results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: local-stack-e2e-results
          path: apps/local-stack-e2e/test-results/junit.xml
          retention-days: 30
