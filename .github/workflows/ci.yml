name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  coverage-contracts:
    name: Coverage — Node contracts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm coverage:contracts

  coverage-ui:
    name: Coverage — UI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm coverage:ui

  coverage-system-db-core:
    name: Coverage — system-db-core
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ikary
          POSTGRES_PASSWORD: ikary
          POSTGRES_DB: ikary_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U ikary"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm coverage:system-db-core
        env:
          TEST_DATABASE_URL: postgres://ikary:ikary@localhost:5433/ikary_test

  coverage-cell-migration-core:
    name: Coverage — cell-migration-core
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ikary
          POSTGRES_PASSWORD: ikary
          POSTGRES_DB: ikary_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U ikary"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm coverage:cell-migration-core
        env:
          TEST_DATABASE_URL: postgres://ikary:ikary@localhost:5433/ikary_test

  coverage-cell-runtime-core:
    name: Coverage — cell-runtime-core
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ikary
          POSTGRES_PASSWORD: ikary
          POSTGRES_DB: ikary_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U ikary"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm coverage:cell-runtime-core
        env:
          TEST_DATABASE_URL: postgres://ikary:ikary@localhost:5433/ikary_test

  e2e:
    name: E2E — MCP Server & API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ikary
          POSTGRES_PASSWORD: ikary
          POSTGRES_DB: ikary_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U ikary"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Create E2E databases
        run: |
          PGPASSWORD=ikary psql -h localhost -p 5433 -U ikary -d ikary_test -c "CREATE DATABASE ikary_mcp_e2e;"
          PGPASSWORD=ikary psql -h localhost -p 5433 -U ikary -d ikary_test -c "CREATE DATABASE ikary_local_e2e;"

      - name: Start MCP server
        run: pnpm --filter @ikary/mcp-server start &
        env:
          DATABASE_URL: postgres://ikary:ikary@localhost:5433/ikary_mcp_e2e

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:4502/api/schemas/manifest --timeout 30000

      - name: Run E2E tests
        run: pnpm --filter @ikary/mcp-server-e2e test
        env:
          IKARY_API_URL: http://localhost:4502

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: apps/mcp-server-e2e/test-results/junit.xml
          retention-days: 30

      - name: Run local stack E2E tests
        run: pnpm --filter @ikary/local-stack-e2e test
        env:
          TEST_DATABASE_URL: postgres://ikary:ikary@localhost:5433/ikary_local_e2e

      - name: Upload local stack E2E results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: local-stack-e2e-results
          path: apps/local-stack-e2e/test-results/junit.xml
          retention-days: 30
