name: Claude Implement Feature

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: claude-do-feature-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  implement-feature:
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@claude do feature') &&
      !github.event.issue.pull_request &&
      contains(vars.CLAUDE_ALLOWED_USERS, github.event.comment.user.login)

    steps:
      - name: Acknowledge trigger
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude do feature"
          branch_prefix: "claude/"
          show_full_output: true
          claude_args: >
            --model claude-sonnet-4-6
            --max-turns 25
          prompt: |
            You are working in the IKARY monorepo (ikary-manifest). Before producing any output, read these files:

            1. CLAUDE.md (root) — Zod contracts rule, library rules, doc-voice reference
            2. libs/LIBRARY_STYLE_RULES.md — microPackageKind, folder layout, naming, Kysely, export surface
            3. libs/LIBRARY_TEMPLATE.md — folder blueprint, export conventions, README template
            4. .claude/doc-voice.md — documentation writing rules
            5. CONTRIBUTING.md — package structure, Zod schemas, testing requirements

            Key IKARY rules:

            CONTRACTS:
            - Every boundary type: Zod-first (z.ZodSchema, derive type via z.infer<typeof schema>)
            - Raw interface/type only for purely structural helpers with no runtime validation need

            LIBRARY STRUCTURE:
            - Every libs/* package declares "microPackageKind" in package.json
            - src/shared/ for browser-safe Zod schemas and types (not src/contracts/)
            - src/server/ for Node/NestJS runtime code in mixed packages
            - src/ui/ for React hooks and components (not src/client/)

            DATABASE:
            - Runtime DB access via Kysely through @ikary/system-db-core
            - No inline SQL in runtime code; raw SQL only in migrations and approved scripts
            - Migration naming: NNN_<lib>_<module>_<action>.sql

            REACT:
            - Components: UI + callbacks only, no business logic, no API calls, no side effects
            - Library hooks live in src/hooks or src/ui/hooks

            DOCUMENTATION:
            - Follow .claude/doc-voice.md strictly
            - No emojis anywhere
            - No em-dashes as clause separators
            - No marketing words (seamlessly, robust, powerful, intuitive, modern, cutting-edge)
            - Direct peer-to-peer tone, active voice, short sentences

            ---

            You are implementing a feature in the IKARY monorepo.

            1. Read the full issue body and all comments.
            2. Find the feature plan (## Feature Plan heading). Follow it step by step.
            3. If no plan exists, implement from the issue description directly, following IKARY conventions.

            IMPLEMENTATION RULES:
            - All new boundary types must be Zod-first (z.ZodSchema, derive type via z.infer<typeof schema>)
            - New libraries must follow libs/LIBRARY_TEMPLATE.md blueprint
            - Declare microPackageKind in package.json for new libs/* packages
            - Use src/shared/ for contracts, src/server/ for backend, src/ui/ for React
            - Database access via Kysely through @ikary/system-db-core
            - Migration files: NNN_<lib>_<module>_<action>.sql
            - React components: UI + callbacks only, no business logic

            BEFORE CREATING THE PR:
            1. Run: pnpm run build
            2. Run: pnpm run typecheck
            3. Verify all new exports are intentional and minimal
            4. Ensure README is complete for any new or modified library

            PR FORMAT:
            - Title: feat(<scope>): <description>
            - Body: follow .claude/doc-voice.md (no emojis, no em-dashes, active voice)
            - Include "Closes #<issue-number>" to auto-close the issue
            - Summarize what was implemented and any deviations from the plan
