name: Claude Implement Feature

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: claude-do-feature-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  implement-feature:
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@claude do feature') &&
      !github.event.issue.pull_request &&
      contains(vars.CLAUDE_ALLOWED_USERS, github.event.comment.user.login)

    steps:
      - name: Acknowledge trigger
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          branch_prefix: "claude/"
          show_full_output: true
          claude_args: >
            --model claude-sonnet-4-6
            --max-turns 50
            --dangerously-skip-permissions
          prompt: |
            Implement the feature described in this issue. Follow all rules in CLAUDE.md.

            IKARY convention files you should consult:
            - libs/LIBRARY_STYLE_RULES.md — microPackageKind, folder layout, naming, Kysely, export surface
            - libs/LIBRARY_TEMPLATE.md — folder blueprint, export conventions, README template
            - .claude/doc-voice.md — documentation writing rules
            - CONTRIBUTING.md — package structure, Zod schemas, testing requirements

            1. Find the feature plan in the comments (## Feature Plan heading). Follow it step by step.
            2. If no plan exists, implement from the issue description directly.
            3. Run pnpm run build and pnpm run typecheck before creating the PR.

            PR FORMAT:
            - Title: feat(<scope>): <description>
            - Body: no emojis, no em-dashes, active voice
            - Include "Closes #<issue-number>"
