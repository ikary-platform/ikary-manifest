<svg width="100%" viewBox="0 0 680 670" role="img" xmlns="http://www.w3.org/2000/svg">
<title>IKARY release workflow</title>
<desc>A flowchart showing the release pipeline from a PR with a release label or a manual changeset file, through the changesets action creating a Version Packages PR, human merge, and publish to npm, GitHub Release, and a permanent release branch.</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Phase labels -->
<text x="40" y="30"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="12" fill="rgb(61,61,58)">PHASE 1 — CHANGESET</text>

<text x="40" y="262"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="12" fill="rgb(61,61,58)">PHASE 2 — VERSION PR</text>

<text x="40" y="468"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="12" fill="rgb(61,61,58)">PHASE 3 — PUBLISH</text>

<!-- PHASE 1: Two input paths -->

<!-- Left: PR with release* label (purple) -->
<rect x="40" y="42" width="220" height="68" rx="8"
  fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
<text x="150" y="68" text-anchor="middle"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="14" font-weight="500" fill="rgb(60,52,137)">PR with release* label</text>
<text x="150" y="88" text-anchor="middle"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="12" fill="rgb(83,74,183)">auto-changeset.yml runs after merge</text>

<!-- Right: PR with changeset file (orange) -->
<rect x="420" y="42" width="220" height="68" rx="8"
  fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
<text x="530" y="68" text-anchor="middle"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="14" font-weight="500" fill="rgb(99,56,6)">PR with changeset file</text>
<text x="530" y="88" text-anchor="middle"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="12" fill="rgb(133,79,11)">contributor ran pnpm changeset</text>

<!-- Diagonal arrows converging to join box -->
<line x1="150" y1="110" x2="318" y2="158"
  stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="530" y1="110" x2="362" y2="158"
  stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Join box: .changeset/*.md on main (gray) -->
<rect x="180" y="160" width="320" height="56" rx="8"
  fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
<text x="340" y="183" text-anchor="middle"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="14" font-weight="500" fill="rgb(68,68,65)">.changeset/*.md on main</text>
<text x="340" y="202" text-anchor="middle"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="12" fill="rgb(95,94,90)">changesets action sees pending change</text>

<!-- Arrow down to phase 2 -->
<line x1="340" y1="216" x2="340" y2="248"
  stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- PHASE 2: Version PR -->

<!-- release.yml creates Version Packages PR (orange) -->
<rect x="170" y="274" width="340" height="56" rx="8"
  fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
<text x="340" y="297" text-anchor="middle"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="14" font-weight="500" fill="rgb(99,56,6)">release.yml creates Version Packages PR</text>
<text x="340" y="316" text-anchor="middle"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="12" fill="rgb(133,79,11)">bumps versions, updates CHANGELOG.md</text>

<!-- Arrow down -->
<line x1="340" y1="330" x2="340" y2="364"
  stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Human reviews and merges (gray) -->
<rect x="170" y="364" width="340" height="56" rx="8"
  fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
<text x="340" y="387" text-anchor="middle"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="14" font-weight="500" fill="rgb(68,68,65)">Human reviews and merges</text>
<text x="340" y="406" text-anchor="middle"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="12" fill="rgb(95,94,90)">final gate before publish</text>

<!-- Arrow down with "on merge" label -->
<line x1="340" y1="420" x2="340" y2="454"
  stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="352" y="441"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="12" fill="rgb(61,61,58)">on merge</text>

<!-- PHASE 3: Publish -->

<!-- changesets/action publishes (orange) -->
<rect x="170" y="480" width="340" height="56" rx="8"
  fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
<text x="340" y="503" text-anchor="middle"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="14" font-weight="500" fill="rgb(99,56,6)">changesets/action publishes</text>
<text x="340" y="522" text-anchor="middle"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="12" fill="rgb(133,79,11)">pnpm build &amp;&amp; changeset publish</text>

<!-- Fan arrows from publish box bottom to three outputs -->
<line x1="255" y1="536" x2="136" y2="588"
  stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="536" x2="340" y2="588"
  stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="425" y1="536" x2="544" y2="588"
  stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Three output boxes (green) -->

<!-- @ikary/cli on npm -->
<rect x="40" y="588" width="192" height="56" rx="8"
  fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="136" y="611" text-anchor="middle"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="14" font-weight="500" fill="rgb(8,80,65)">@ikary/cli on npm</text>
<text x="136" y="630" text-anchor="middle"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="12" fill="rgb(15,110,86)">new version published</text>

<!-- GitHub Release -->
<rect x="244" y="588" width="192" height="56" rx="8"
  fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="340" y="611" text-anchor="middle"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="14" font-weight="500" fill="rgb(8,80,65)">GitHub Release</text>
<text x="340" y="630" text-anchor="middle"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="12" fill="rgb(15,110,86)">CHANGELOG as release notes</text>

<!-- release/vX.Y.Z branch -->
<rect x="448" y="588" width="192" height="56" rx="8"
  fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
<text x="544" y="611" text-anchor="middle"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="14" font-weight="500" fill="rgb(8,80,65)">release/vX.Y.Z</text>
<text x="544" y="630" text-anchor="middle"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  font-size="12" fill="rgb(15,110,86)">permanent branch on GitHub</text>

</svg>
