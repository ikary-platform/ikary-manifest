$schema: "../cell-manifest.schema.yaml"

apiVersion: ikary.co/v1alpha1
kind: Cell
metadata:
  key: crm
  name: CRM Cell
  version: "1.0.0"
spec:
  mount:
    mountPath: /crm
    landingPage: customer-list

  roles:
    - key: admin
      name: Admin
      scopes:
        - crm.admin
    - key: sales
      name: Sales
      scopes:
        - crm.customer.view

  entities:
    - $ref: "./entities/customer.entity.yaml"
    - $ref: "./entities/invoice.entity.yaml"

  pages:
    - key: dashboard
      type: dashboard
      title: Dashboard
      path: /dashboard
    - key: customer-list
      type: entity-list
      title: Customers
      path: /customers
      entity: customer
    - key: customer-detail
      type: entity-detail
      title: Customer Detail
      path: /customers/:id
      entity: customer

  navigation:
    items:
      - type: page
        key: dashboard
        pageKey: dashboard
      - type: group
        key: customers
        label: Customers
        children:
          - type: page
            key: customer-list
            pageKey: customer-list
