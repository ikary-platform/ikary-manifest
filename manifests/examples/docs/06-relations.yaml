$schema: "../../cell-manifest.schema.yaml"

apiVersion: ikary.co/v1alpha1
kind: Cell
metadata:
  key: doc_relations
  name: Entity Relations
  version: "1.0.0"
  description: "Customer (has_many orders) and Order (belongs_to customer) — demonstrates belongs_to and has_many relation types."
spec:
  mount:
    mountPath: /
    landingPage: customer_list
  entities:
    - key: customer
      name: Customer
      pluralName: Customers
      fields:
        - key: name
          name: Name
          type: string
          required: true
          list:
            visible: true
            searchable: true
          form:
            visible: true
        - key: email
          name: Email
          type: string
          required: true
          list:
            visible: true
          form:
            visible: true
            placeholder: name@example.com
        - key: status
          name: Status
          type: enum
          enumValues: [active, inactive]
          required: true
          list:
            visible: true
          form:
            visible: true
      relations:
        - key: orders
          relation: has_many
          entity: order
          foreignKey: customer_id
    - key: order
      name: Order
      pluralName: Orders
      fields:
        - key: reference
          name: Reference
          type: string
          required: true
          list:
            visible: true
            searchable: true
          form:
            visible: true
            placeholder: ORD-0001
        - key: amount
          name: Amount
          type: number
          required: true
          list:
            visible: true
          form:
            visible: true
        - key: status
          name: Status
          type: enum
          enumValues: [pending, confirmed, fulfilled, cancelled]
          required: true
          list:
            visible: true
          form:
            visible: true
        - key: order_date
          name: Order Date
          type: date
          required: true
          list:
            visible: true
          form:
            visible: true
      relations:
        - key: customer_id
          relation: belongs_to
          entity: customer
          required: true
  pages:
    - key: customer_list
      type: entity-list
      title: Customers
      path: /customers
      entity: customer
    - key: customer_detail
      type: entity-detail
      title: Customer
      path: /customers/:id
      entity: customer
    - key: customer_create
      type: entity-create
      title: New Customer
      path: /customers/new
      entity: customer
    - key: order_list
      type: entity-list
      title: Orders
      path: /orders
      entity: order
    - key: order_detail
      type: entity-detail
      title: Order
      path: /orders/:id
      entity: order
    - key: order_create
      type: entity-create
      title: New Order
      path: /orders/new
      entity: order
  navigation:
    items:
      - type: page
        key: nav_customers
        pageKey: customer_list
        label: Customers
      - type: page
        key: nav_orders
        pageKey: order_list
        label: Orders
