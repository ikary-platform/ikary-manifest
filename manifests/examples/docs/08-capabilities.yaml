$schema: "../../cell-manifest.schema.yaml"

apiVersion: ikary.co/v1alpha1
kind: Cell
metadata:
  key: doc_capabilities
  name: Capabilities
  version: "1.0.0"
  description: "A ticket entity with capability definitions: transition actions, mutation (reset), and PDF export."
spec:
  mount:
    mountPath: /
    landingPage: ticket_list
  entities:
    - key: ticket
      name: Ticket
      pluralName: Tickets
      fields:
        - key: subject
          name: Subject
          type: string
          required: true
          list:
            visible: true
            searchable: true
          form:
            visible: true
        - key: description
          name: Description
          type: text
          form:
            visible: true
          list:
            visible: false
        - key: priority
          name: Priority
          type: enum
          enumValues: [low, medium, high, critical]
          required: true
          list:
            visible: true
            filterable: true
          form:
            visible: true
        - key: status
          name: Status
          type: enum
          enumValues: [open, in_progress, resolved, closed]
          required: true
          list:
            visible: true
          form:
            visible: true
        - key: assignee
          name: Assignee
          type: string
          list:
            visible: true
          form:
            visible: true
      lifecycle:
        field: status
        initial: open
        states: [open, in_progress, resolved, closed]
        transitions:
          - key: assign
            from: open
            to: in_progress
            label: Assign & Start
          - key: resolve
            from: in_progress
            to: resolved
            label: Resolve
            event: ticket.resolved
          - key: close
            from: resolved
            to: closed
            label: Close
          - key: reopen
            from: [resolved, closed]
            to: open
            label: Reopen
      capabilities:
        - key: assign
          type: transition
          transition: assign
          description: Assign ticket to a team member
        - key: resolve
          type: transition
          transition: resolve
          description: Mark ticket as resolved
          confirm: true
        - key: export_pdf
          type: export
          format: pdf
          description: Export ticket as PDF
        - key: reset
          type: mutation
          updates:
            status: open
            assignee: null
          description: Reset ticket to open
          confirm: true
  pages:
    - key: ticket_list
      type: entity-list
      title: Tickets
      path: /tickets
      entity: ticket
    - key: ticket_detail
      type: entity-detail
      title: Ticket Detail
      path: /tickets/:id
      entity: ticket
    - key: ticket_create
      type: entity-create
      title: New Ticket
      path: /tickets/new
      entity: ticket
  navigation:
    items:
      - type: page
        key: nav_tickets
        pageKey: ticket_list
        label: Tickets
