$schema: "../../cell-manifest.schema.yaml"

apiVersion: ikary.co/v1alpha1
kind: Cell
metadata:
  key: proj_tasks
  name: Task Tracker
  version: "1.0.0"
  description: "Project management tool: Projects contain Sprints and Tasks. Tasks have a full development lifecycle with review step."
spec:
  mount:
    mountPath: /
    landingPage: dashboard
  entities:
    - key: project
      name: Project
      pluralName: Projects
      fields:
        - key: name
          name: Name
          type: string
          required: true
          list:
            visible: true
            searchable: true
          form:
            visible: true
        - key: key
          name: Key
          type: string
          required: true
          list:
            visible: true
          form:
            visible: true
            placeholder: PROJ
          helpText: "Short uppercase identifier, e.g. PROJ"
        - key: description
          name: Description
          type: text
          form:
            visible: true
          list:
            visible: false
        - key: status
          name: Status
          type: enum
          enumValues: [planning, active, on_hold, completed, cancelled]
          required: true
          list:
            visible: true
            filterable: true
          form:
            visible: true
        - key: start_date
          name: Start Date
          type: date
          list:
            visible: true
          form:
            visible: true
        - key: target_date
          name: Target Date
          type: date
          list:
            visible: true
          form:
            visible: true
        - key: owner
          name: Owner
          type: string
          list:
            visible: true
          form:
            visible: true
      relations:
        - key: sprints
          relation: has_many
          entity: sprint
          foreignKey: project_id
        - key: tasks
          relation: has_many
          entity: task
          foreignKey: project_id
    - key: sprint
      name: Sprint
      pluralName: Sprints
      fields:
        - key: name
          name: Name
          type: string
          required: true
          list:
            visible: true
            searchable: true
          form:
            visible: true
            placeholder: Sprint 1
        - key: goal
          name: Goal
          type: text
          form:
            visible: true
          list:
            visible: false
        - key: status
          name: Status
          type: enum
          enumValues: [planned, active, completed]
          required: true
          list:
            visible: true
          form:
            visible: true
        - key: start_date
          name: Start Date
          type: date
          required: true
          list:
            visible: true
          form:
            visible: true
        - key: end_date
          name: End Date
          type: date
          required: true
          list:
            visible: true
          form:
            visible: true
        - key: capacity_points
          name: "Capacity (pts)"
          type: number
          list:
            visible: true
          form:
            visible: true
      relations:
        - key: project_id
          relation: belongs_to
          entity: project
          required: true
        - key: tasks
          relation: has_many
          entity: task
          foreignKey: sprint_id
    - key: task
      name: Task
      pluralName: Tasks
      fields:
        - key: title
          name: Title
          type: string
          required: true
          list:
            visible: true
            searchable: true
          form:
            visible: true
        - key: description
          name: Description
          type: text
          form:
            visible: true
          list:
            visible: false
        - key: type
          name: Type
          type: enum
          enumValues: [feature, bug, chore, spike]
          required: true
          list:
            visible: true
            filterable: true
          form:
            visible: true
        - key: priority
          name: Priority
          type: enum
          enumValues: [low, medium, high, critical]
          required: true
          list:
            visible: true
            filterable: true
          form:
            visible: true
        - key: status
          name: Status
          type: enum
          enumValues: [todo, in_progress, review, done]
          required: true
          list:
            visible: true
            filterable: true
          form:
            visible: true
        - key: assignee
          name: Assignee
          type: string
          list:
            visible: true
          form:
            visible: true
        - key: story_points
          name: Story Points
          type: number
          list:
            visible: true
          form:
            visible: true
        - key: due_date
          name: Due Date
          type: date
          list:
            visible: true
          form:
            visible: true
      relations:
        - key: project_id
          relation: belongs_to
          entity: project
          required: true
        - key: sprint_id
          relation: belongs_to
          entity: sprint
          required: false
      lifecycle:
        field: status
        initial: todo
        states: [todo, in_progress, review, done]
        transitions:
          - key: start
            from: todo
            to: in_progress
            label: Start
            guards: ["assignee != null"]
          - key: submit_review
            from: in_progress
            to: review
            label: Submit for Review
          - key: request_changes
            from: review
            to: in_progress
            label: Request Changes
          - key: approve
            from: review
            to: done
            label: Approve & Close
            event: task.completed
          - key: reopen
            from: done
            to: todo
            label: Reopen
  pages:
    - key: dashboard
      type: dashboard
      title: Dashboard
      path: /dashboard
    - key: project_list
      type: entity-list
      title: Projects
      path: /projects
      entity: project
    - key: project_detail
      type: entity-detail
      title: Project
      path: /projects/:id
      entity: project
    - key: project_create
      type: entity-create
      title: New Project
      path: /projects/new
      entity: project
    - key: sprint_list
      type: entity-list
      title: Sprints
      path: /sprints
      entity: sprint
    - key: sprint_detail
      type: entity-detail
      title: Sprint
      path: /sprints/:id
      entity: sprint
    - key: sprint_create
      type: entity-create
      title: New Sprint
      path: /sprints/new
      entity: sprint
    - key: task_list
      type: entity-list
      title: Tasks
      path: /tasks
      entity: task
    - key: task_detail
      type: entity-detail
      title: Task
      path: /tasks/:id
      entity: task
    - key: task_create
      type: entity-create
      title: New Task
      path: /tasks/new
      entity: task
  navigation:
    items:
      - type: page
        key: nav_dashboard
        pageKey: dashboard
        label: Dashboard
      - type: group
        key: nav_planning
        label: Planning
        children:
          - type: page
            key: nav_projects
            pageKey: project_list
            label: Projects
          - type: page
            key: nav_sprints
            pageKey: sprint_list
            label: Sprints
      - type: page
        key: nav_tasks
        pageKey: task_list
        label: Tasks
