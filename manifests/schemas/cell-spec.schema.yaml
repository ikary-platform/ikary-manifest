$schema: "https://json-schema.org/draft/2020-12/schema"
title: CellSpec
description: |
  The specification body of a Cell manifest.
  At least one of entities, pages, or navigation must be present.

type: object
required: [mount]
additionalProperties: false

properties:
  mount:
    $ref: "./mount.schema.yaml"

  appShell:
    $ref: "./app-shell.schema.yaml"

  entities:
    type: array
    items:
      $ref: "./entity-definition.schema.yaml"
    description: |
      Inline entity definitions, or $ref pointers to standalone
      entity YAML files under manifests/entities/.

  pages:
    type: array
    items:
      $ref: "./page-definition.schema.yaml"

  navigation:
    $ref: "./navigation.schema.yaml"

  roles:
    type: array
    items:
      $ref: "./role-definition.schema.yaml"
