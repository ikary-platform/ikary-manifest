$schema: "https://json-schema.org/draft/2020-12/schema"
title: EntityDefinition
description: |
  A domain entity: its fields, relations, computed values, lifecycle,
  capabilities, policies, and validation rules.

type: object
required: [key, name, pluralName, fields]
additionalProperties: false

properties:
  key:
    type: string
    pattern: "^[a-z][a-z0-9_]*$"
    description: Snake-case identifier unique within a manifest.
  name:
    type: string
    minLength: 1
  pluralName:
    type: string
    minLength: 1

  fields:
    type: array
    minItems: 1
    items:
      $ref: "./field-definition.schema.yaml"

  relations:
    type: array
    items:
      $ref: "./relation-definition.schema.yaml"

  computed:
    type: array
    items:
      $ref: "./computed-field.schema.yaml"

  lifecycle:
    $ref: "./lifecycle.schema.yaml"

  events:
    $ref: "./event.schema.yaml"

  capabilities:
    type: array
    items:
      $ref: "./capability-definition.schema.yaml"

  policies:
    $ref: "./policy.schema.yaml#/definitions/EntityPoliciesDefinition"

  fieldPolicies:
    $ref: "./policy.schema.yaml#/definitions/FieldPoliciesDefinition"

  validation:
    $ref: "./entity-validation.schema.yaml"

  governance:
    type: object
    additionalProperties: false
    properties:
      tier:
        type: string
        enum: [tier-1, tier-2, tier-3]
        default: tier-2
      rollbackEnabled:
        type: boolean
        default: true
      maxRollbackDepth:
        type: integer
        minimum: 1
