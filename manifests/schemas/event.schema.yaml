$schema: "https://json-schema.org/draft/2020-12/schema"
title: EventDefinition
description: Controls which entity mutations emit audit events.

type: object
additionalProperties: false

properties:
  exclude:
    type: array
    items: { type: string }
    uniqueItems: true
    description: Field keys excluded from change tracking.
  names:
    type: object
    additionalProperties: false
    properties:
      created: { type: string, minLength: 1 }
      updated: { type: string, minLength: 1 }
      deleted: { type: string, minLength: 1 }
