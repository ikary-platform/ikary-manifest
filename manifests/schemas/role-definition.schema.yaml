$schema: "https://json-schema.org/draft/2020-12/schema"
title: RoleDefinition
description: A named role with permission scopes.

type: object
required: [key, name, scopes]
additionalProperties: false

properties:
  key:
    type: string
    minLength: 1
  name:
    type: string
    minLength: 1
  description:
    type: string
    minLength: 1
  scopes:
    type: array
    items: { type: string }
    minItems: 1
    uniqueItems: true
  identityMappings:
    type: array
    items: { type: string }
    uniqueItems: true
