$schema: "https://json-schema.org/draft/2020-12/schema"
title: CellMetadata
description: Metadata block identifying a Cell manifest.

type: object
required: [key, name, version]
additionalProperties: false

properties:
  key:
    type: string
    minLength: 1
  name:
    type: string
    minLength: 1
  description:
    type: string
    minLength: 1
  version:
    type: string
    minLength: 1
